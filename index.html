<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabzon Haber Terminali</title>
    <style>
        :root { --bg: #f0f2f5; --card-bg: #ffffff; --text: #1c1e21; --muted: #65676b; --accent: #0084ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        
        /* Giriş Paneli */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        .login-card input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #main-content { display: none; }
        .header-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; padding-top: 10px; }
        
        /* DEV ANA LOGO (Tam Kaplama) */
        .logo-box { 
            background: white; 
            border-radius: 50%; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); 
            width: 140px; height: 140px; /* Boyut 100px'den 140px'e çıktı */
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; /* Logonun dışarı taşmasını engeller */
            border: 4px solid white;
        }
        .logo-box img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* Daireyi tam doldurmasını sağlar */
        }

        /* DEV DAİRESEL SEKME TASARIMI */
        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; flex-wrap: wrap; }
        .tab { 
            background: white; 
            width: 85px; height: 85px; /* Sekme boyutu 65px'den 85px'e çıktı */
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            overflow: hidden;
            padding: 0; /* İç boşluğu sıfırladık */
        }
        .tab img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* İkonun daireyi tam kaplamasını sağlar */
            transition: 0.3s;
        }
        .tab:hover { transform: scale(1.1); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .tab.active { 
            background: var(--accent); 
            box-shadow: 0 0 0 5px white, 0 8px 25px rgba(0, 132, 255, 0.5); 
            transform: scale(1.1);
        }

        /* Haber Kartları Düzeni */
        .news-container { display: none; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .news-container.active { display: grid; }
        .news-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; display: flex; flex-direction: column; height: 100%; }
        .news-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        .image-wrapper { width: 100%; height: 200px; background: #eee; overflow: hidden; }
        .news-image { width: 100%; height: 100%; object-fit: cover; }
        .news-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .source-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .tag { background: #f0f2f5; color: var(--muted); padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; display: flex; align-items: center; }
        .summary-box { display: none; background: #f8f9fa; padding: 15px; border-left: 5px solid var(--accent); font-size: 14px; color: #333; margin: 15px 0; line-height: 1.6; border-radius: 8px; }
        .footer-action { border-top: 1px solid #f0f2f5; padding-top: 15px; margin-top: auto; display: flex; justify-content: space-between; align-items: center; }
        .btn-summary { background: none; border: none; color: var(--accent); cursor: pointer; font-weight: 800; font-size: 13px; }
        .read-more { color: var(--muted); text-decoration: none; font-weight: 800; font-size: 13px; }

        @media (max-width: 600px) { .tab { width: 70px; height: 70px; } .logo-box { width: 120px; height: 120px; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <img src="logo.png" style="width: 100px; border-radius: 50%; margin-bottom: 15px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6195/6195696.png'">
            <h2>Terminal Girişi</h2>
            <input type="password" id="pass-input" placeholder="Şifre..." onkeypress="if(event.key==='Enter') checkPass()">
            <button onclick="checkPass()">GİRİŞ YAP</button>
            <p id="error-msg" style="color: red; font-size: 13px; margin-top: 10px; display: none;">Hatalı Şifre!</p>
        </div>
    </div>

    <div id="main-content">
        <div class="header-area">
            <div class="logo-box">
                <img src="logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/21/21601.png'">
            </div>
            </div>
        
        <div class="tabs">
            <button id="tab-GND" class="tab active" onclick="switchTab('GND')" title="Ulusal"><img src="ulusal.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2983/2983803.png'"></button>
            <button id="tab-YRL" class="tab" onclick="switchTab('YRL')" title="Yerel"><img src="yerel.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1141/1141974.png'"></button>
            <button id="tab-TKP" class="tab" onclick="switchTab('TKP')" title="Takip"><img src="anahtar.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2550/2550260.png'"></button>
            <button id="tab-SOC" class="tab" onclick="switchTab('SOC')" title="Sosyal"><img src="sosyal.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1968/1968641.png'"></button>
        </div>

        <div id="news-GND" class="news-container active"></div>
        <div id="news-YRL" class="news-container"></div>
        <div id="news-TKP" class="news-container"></div>
        <div id="news-SOC" class="news-container"></div>
    </div>

    <script>
        async function checkPass() {
            const input = document.getElementById('pass-input').value.trim();
            const msgBuffer = new TextEncoder().encode(input);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            const target = "d9daf48bb0f518882e3b670721ba7f126a6bcf988ac7e33816292999bd9a1729";

            if (hashHex === target) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                sessionStorage.setItem('auth_key', 'true');
                loadNews();
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('pass-input').value = "";
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem('auth_key') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadNews();
            }
        };

        function switchTab(botType) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + botType).classList.add('active');
            document.querySelectorAll('.news-container').forEach(c => c.classList.remove('active'));
            document.getElementById('news-' + botType).classList.add('active');
        }

        function toggleSummary(id) {
            const s = document.getElementById('sum-' + id);
            if (s) s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        }

        function loadNews() {
            fetch('news.json?t=' + Date.now()).then(r => r.json()).then(data => {
                document.querySelectorAll('.news-container').forEach(c => c.innerHTML = '');
                data.forEach(n => {
                    const container = document.getElementById(`news-${n.type}`);
                    if (!container) return;
                    const kw = n.keyword ? `<span style="background:#e3f2fd; color:#0d47a1; padding:2px 8px; border-radius:6px; font-size:10px; margin-right:5px; font-weight:bold;">#${n.keyword.toUpperCase()}</span>` : '';
                    container.innerHTML += `
                        <div class="news-card">
                            <div class="image-wrapper"><img src="${n.image}" class="news-image" onerror="this.src='https://placehold.co/600x400?text=Haber'"></div>
                            <div class="news-content">
                                <div class="source-bar">
                                    <span class="tag">${kw}${n.source}</span>
                                    <span style="font-size:10px; color:#999;">${n.time}</span>
                                </div>
                                <h3 style="font-size:16px; margin:0 0 12px 0; color:#050505;">${n.title}</h3>
                                <div id="sum-${n.id}" class="summary-box">${n.summary}</div>
                                <div class="footer-action">
                                    <button class="btn-summary" onclick="toggleSummary('${n.id}')">📝 ÖZET</button>
                                    <a href="${n.link}" target="_blank" class="read-more">GİT →</a>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }
        setInterval(loadNews, 60000);
    </script>
</body>
</html>
