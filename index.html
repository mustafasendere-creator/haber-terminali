<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabzon Haber Terminali v24.3</title>
    <style>
        :root { --bg: #f0f2f5; --card-bg: #ffffff; --text: #1c1e21; --muted: #65676b; --accent: #0084ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        
        /* Giriş Paneli */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        .login-card input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Ana İçerik */
        #main-content { display: none; }
        .header-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        
        /* LOGO ALANI */
        .logo-box { 
            background: white; padding: 10px; border-radius: 50%; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; 
            width: 100px; height: 100px; display: flex; align-items: center; justify-content: center;
        }
        .logo-box img { width: 80px; height: 80px; object-fit: contain; }

        h1 { text-align: center; color: var(--text); margin: 0; font-weight: 900; font-size: 26px; text-transform: uppercase; letter-spacing: -1px; }
        
        /* Sekme Menüsü */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab { 
            background: #e4e6eb; padding: 12px 20px; border-radius: 20px; cursor: pointer; 
            font-weight: 600; display: flex; align-items: center; transition: 0.2s; border: none;
        }
        .tab img { width: 20px; height: 20px; margin-right: 8px; border-radius: 4px; }
        .tab.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(0, 132, 255, 0.3); }

        /* Haber Kartları */
        .news-container { display: none; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .news-container.active { display: grid; }
        .news-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: 0.2s; display: flex; flex-direction: column; height: 100%; }
        .news-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px rgba(0,0,0,0.12); }
        
        .image-wrapper { width: 100%; height: 180px; background: #eee; overflow: hidden; }
        .news-image { width: 100%; height: 100%; object-fit: cover; }
        
        .news-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .source-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .tag { background: #f0f2f5; color: var(--muted); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; display: flex; align-items: center; }
        .tag img { width: 14px; height: 14px; margin-right: 5px; }
        
        .summary-box { display: none; background: #f9f9f9; padding: 12px; border-left: 4px solid var(--accent); font-size: 13px; color: #444; margin: 10px 0; line-height: 1.5; border-radius: 4px; }
        
        .footer-action { border-top: 1px solid #f0f2f5; padding-top: 12px; margin-top: auto; display: flex; justify-content: space-between; align-items: center; }
        .btn-summary { background: none; border: none; color: var(--accent); cursor: pointer; font-weight: 700; font-size: 13px; }
        .read-more { color: var(--muted); text-decoration: none; font-weight: 700; font-size: 13px; }

        @media (max-width: 600px) { .tab { padding: 8px 12px; font-size: 13px; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <img src="logo.png" style="width: 80px; margin-bottom: 10px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6195/6195696.png'">
            <h2>Terminal Erişimi</h2>
            <input type="password" id="pass-input" placeholder="Şifre..." onkeypress="if(event.key==='Enter') checkPass()">
            <button onclick="checkPass()">GİRİŞ YAP</button>
            <p id="error-msg" style="color: red; font-size: 13px; margin-top: 10px; display: none;">Hatalı Şifre!</p>
        </div>
    </div>

    <div id="main-content">
        <div class="header-area">
            <div class="logo-box">
                <img src="logo.png" alt="Trabzon Haber Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/21/21601.png'">
            </div>
            <h1><span style="color: var(--accent);">TRABZON</span> HABER TERMİNALİ</h1>
            <div style="width: 60px; height: 4px; background: var(--accent); border-radius: 2px; margin-top: 10px;"></div>
        </div>
        
        <div class="tabs">
            <div id="tab-GND" class="tab active" onclick="switchTab('GND')"><img src="ulusal.png"> Ulusal</div>
            <div id="tab-YRL" class="tab" onclick="switchTab('YRL')"><img src="yerel.png"> Yerel</div>
            <div id="tab-TKP" class="tab" onclick="switchTab('TKP')"><img src="anahtar.png"> Takip</div>
            <div id="tab-SOC" class="tab" onclick="switchTab('SOC')"><img src="sosyal.png"> Sosyal</div>
        </div>

        <div id="news-GND" class="news-container active"></div>
        <div id="news-YRL" class="news-container"></div>
        <div id="news-TKP" class="news-container"></div>
        <div id="news-SOC" class="news-container"></div>
    </div>

    <script>
        // ŞİFRE VE GÜVENLİK
        async function checkPass() {
            const input = document.getElementById('pass-input').value.trim();
            const msgBuffer = new TextEncoder().encode(input);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // Şifre
            const target = "d9daf48bb0f518882e3b670721ba7f126a6bcf988ac7e33816292999bd9a1729";

            if (hashHex === target) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                sessionStorage.setItem('auth_key', 'true');
                loadNews();
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('pass-input').value = "";
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem('auth_key') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadNews();
            }
        };

        // HABER FONKSİYONLARI
        function getLogo(type) {
            const logos = { 'GND': 'ulusal.png', 'YRL': 'yerel.png', 'TKP': 'anahtar.png', 'SOC': 'sosyal.png' };
            return logos[type] || '';
        }

        function switchTab(botType) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + botType).classList.add('active');
            document.querySelectorAll('.news-container').forEach(c => c.classList.remove('active'));
            document.getElementById('news-' + botType).classList.add('active');
        }

        function toggleSummary(id) {
            const s = document.getElementById('sum-' + id);
            if (s) s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        }

        function loadNews() {
            fetch('news.json?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    document.querySelectorAll('.news-container').forEach(c => c.innerHTML = '');
                    data.forEach(n => {
                        const container = document.getElementById(`news-${n.type}`);
                        if (!container) return;

                        const kwLabel = n.keyword ? `<span style="background:#e3f2fd; color:#0d47a1; padding:2px 6px; border-radius:4px; font-size:10px; margin-right:5px; font-weight:bold;">#${n.keyword.toUpperCase()}</span>` : '';

                        container.innerHTML += `
                            <div class="news-card">
                                <div class="image-wrapper">
                                    <img src="${n.image || 'https://placehold.co/600x400?text='+n.source}" class="news-image" onerror="this.src='https://placehold.co/600x400?text=Haber+Resmi'">
                                </div>
                                <div class="news-content">
                                    <div class="source-bar">
                                        <span class="tag"><img src="${getLogo(n.type)}">${kwLabel}${n.source}</span>
                                        <span style="font-size:10px; color:#999;">${n.time}</span>
                                    </div>
                                    <h3 style="font-size:15px; line-height:1.4; margin:0 0 10px 0; color:#050505;">${n.title}</h3>
                                    <div id="sum-${n.id}" class="summary-box">${n.summary || 'Özet bulunamadı.'}</div>
                                    <div class="footer-action">
                                        <button class="btn-summary" onclick="toggleSummary('${n.id}')">📝 ÖZETİ OKU</button>
                                        <a href="${n.link}" target="_blank" class="read-more">HABERE GİT →</a>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                });
        }
        setInterval(loadNews, 60000);
    </script>
</body>
</html>
