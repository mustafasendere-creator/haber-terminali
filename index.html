<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabzon Haber Terminali</title>
    <style>
        :root { --bg: #f0f2f5; --card-bg: #ffffff; --text: #1c1e21; --muted: #65676b; --accent: #0084ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        .login-card input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #main-content { display: none; }
        .header-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        h1 { text-align: center; color: var(--text); margin: 0; font-weight: 900; font-size: 28px; text-transform: uppercase; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab { background: #e4e6eb; padding: 12px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; border: none; }
        .tab.active { background: var(--accent); color: white; }
        .news-container { display: none; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .news-container.active { display: grid; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <img src="logo.svg" style="width: 80px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6195/6195696.png'">
            <h2>Terminal Girişi</h2>
            <input type="password" id="pass-input" placeholder="Şifre..." onkeypress="if(event.key==='Enter') checkPass()">
            <button onclick="checkPass()">GİRİŞ YAP</button>
            <p id="error-msg" style="color: red; font-size: 13px; margin-top: 10px; display: none;">Hatalı Şifre!</p>
        </div>
    </div>

    <div id="main-content">
        <div class="header-area">
            <img src="logo.svg" alt="Logo" onerror="this.style.display='none'">
            <h1>TRABZON HABER TERMİNALİ</h1>
        </div>
        <div class="tabs">
            <div id="tab-GND" class="tab active" onclick="switchTab('GND')">Ulusal</div>
            <div id="tab-YRL" class="tab" onclick="switchTab('YRL')">Yerel</div>
            <div id="tab-TKP" class="tab" onclick="switchTab('TKP')">Takip</div>
            <div id="tab-SOC" class="tab" onclick="switchTab('SOC')">Sosyal</div>
        </div>
        <div id="news-GND" class="news-container active"></div>
        <div id="news-YRL" class="news-container"></div>
        <div id="news-TKP" class="news-container"></div>
        <div id="news-SOC" class="news-container"></div>
    </div>

    <script>
        async function checkPass() {
            const input = document.getElementById('pass-input').value.trim();
            const msgBuffer = new TextEncoder().encode(input);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // SENİN EKRAN GÖRÜNTÜNDEKİ GERÇEK KOD:
            const target = "d9daf48bb0f518882e3b670721ba7f126a6bcf988ac7e33816292999bd9a1729";

            if (hashHex === target) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                sessionStorage.setItem('auth_key', 'true');
                loadNews();
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('pass-input').value = "";
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem('auth_key') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadNews();
            }
        };

        function switchTab(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + type).classList.add('active');
            document.querySelectorAll('.news-container').forEach(c => c.classList.remove('active'));
            document.getElementById('news-' + type).classList.add('active');
        }

        function loadNews() {
            fetch('news.json?t=' + Date.now()).then(r => r.json()).then(data => {
                document.querySelectorAll('.news-container').forEach(c => c.innerHTML = '');
                data.forEach(n => {
                    const container = document.getElementById(`news-${n.type}`);
                    if (!container) return;
                    container.innerHTML += `<div style="padding:15px; background:white; margin-bottom:10px; border-radius:8px;">
                        <h3 style="font-size:16px; margin:0;">${n.title}</h3>
                        <p style="font-size:12px; color:#666;">${n.source} • ${n.time}</p>
                        <a href="${n.link}" target="_blank" style="font-size:12px; color:blue; text-decoration:none;">Habere Git →</a>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
