<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haber Terminali v1.0</title>
    <style>
        body { background: #0d0d0d; color: #00ff41; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 15px; }
        .header { border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; }
        .news-card { border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 5px; background: #1a1a1a; transition: 0.3s; }
        .news-card:hover { border-color: #00ff41; box-shadow: 0 0 10px #00ff41; }
        .tag { display: inline-block; background: #00ff41; color: #000; padding: 2px 8px; border-radius: 3px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .source { color: #888; font-size: 14px; }
        h3 { margin: 5px 0; color: #fff; font-size: 18px; }
        p { color: #ccc; font-size: 14px; line-height: 1.5; }
        a { color: #00ff41; text-decoration: none; border: 1px solid #00ff41; padding: 5px 10px; display: inline-block; margin-top: 10px; border-radius: 3px; }
        .time { float: right; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <div class="header">
        <h1>> HABER_TERMINALI_v22.1</h1>
        <small id="status">Sistem Aktif: <span id="count">0</span> Haber listelendi...</small>
    </div>
    <div id="news-container">
        </div>

    <script>
        function loadNews() {
            fetch('news.json')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('count').innerText = data.length;
                    const container = document.getElementById('news-container');
                    container.innerHTML = data.map(n => `
                        <div class="news-card">
                            <span class="time">${n.time}</span>
                            <div class="tag">${n.type}</div>
                            <div class="source">${n.source}</div>
                            <h3>${n.title}</h3>
                            <p>${n.summary}...</p>
                            <a href="${n.link}" target="_blank">HABERE_GIT >></a>
                        </div>
                    `).join('');
                });
        }
        loadNews();
        setInterval(loadNews, 30000); // 30 saniyede bir güncelle
    </script>
</body>
</html>
